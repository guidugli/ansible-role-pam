---
# defaults file for pam

# Authselect management
authselect_enabled: "{{ _authselect_enabled }}"
authselect_create_profile: false
authselect_custom_profile_name: site-profile
authselect_base_profile: sssd
authselect_select_profile: cis_local
authselect_options:
  - with-faillock
  - without-nullok

# su restriction
auth_su_group: admin

# pwhistory policy
auth_remember: 5
auth_remember_file: null

# faillock policy
auth_faillock_dir: null
auth_audit: false
auth_silent: false
auth_no_log_info: false
auth_deny_after: 5
auth_fail_interval: 900
auth_unlock_time: 600
auth_even_deny_root: false
auth_root_unlock_time: null
auth_admin_group: null

# pwquality policy
auth_retry: 3
auth_min_length: 14
auth_dcredit: -1
auth_ucredit: -1
auth_ocredit: -1
auth_lcredit: -1
auth_enforce_for_root: true
auth_local_users_only: true

# Optional pwquality advanced settings. A null value means "do not render".
auth_difok: null
auth_maxrepeat: null
auth_maxclassrepeat: null
auth_gecoscheck: null
auth_dictcheck: null
auth_usercheck: null
auth_usersubstr: null
auth_enforcing: null
auth_dictpath: null
