---
# This workflow requires a GALAXY_API_KEY secret present in the GitHub
# repository or organization.
#
# See: https://github.com/marketplace/actions/publish-ansible-role-to-galaxy
# See: https://github.com/ansible/galaxy/issues/46

name: Release

'on':
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Trigger Galaxy import
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: ${{ vars.WORKING_DIR }}

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4
        with:
          path: ${{ vars.WORKING_DIR }}

      - name: Validate release tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not a valid release tag (expected vX.Y.Z)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'ansible-core>=2.19,<2.20'

      - name: Trigger a new import on Galaxy
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"

          ansible-galaxy -vvv role import \
            --api-key "${GALAXY_API_KEY}" \
            "${OWNER}" \
            "${REPO}"
