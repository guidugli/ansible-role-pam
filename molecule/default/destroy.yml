---
- name: Destroy containers (podman)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove containers
      containers.podman.podman_container:
        name: "{{ item }}"
        state: absent
      loop: "{{ groups.get('molecule', []) }}"

- name: Clear Molecule instance config (cleanup for molecule list/login)
  hosts: localhost
  gather_facts: false
  vars:
    instance_config_path: "{{ lookup('env', 'MOLECULE_INSTANCE_CONFIG') }}"
  tasks:
    - name: Remove instance config file if present
      ansible.builtin.file:
        path: "{{ instance_config_path }}"
        state: absent
      when: instance_config_path | default('') | length > 0
