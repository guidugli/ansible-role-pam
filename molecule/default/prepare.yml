---
- name: Shared prepare (bootstrap python + essentials)
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Detect OS via /etc/os-release (works without python)
      ansible.builtin.raw: cat /etc/os-release
      register: osr
      changed_when: false

    - name: Install python on Debian/Ubuntu
      ansible.builtin.raw: >
        /bin/sh -c 'set -e;
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update;
        apt-get install -y --no-install-recommends python3 python3-apt sudo ca-certificates iproute2;
        rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*'
      when: "'ID=debian' in osr.stdout or 'ID=ubuntu' in osr.stdout"
      changed_when: true

    - name: Install python on Fedora
      ansible.builtin.raw: >
        /bin/sh -c 'set -e;
        dnf install -y python3 python3-dnf sudo ca-certificates iproute;
        dnf clean all;
        rm -rf /var/cache/dnf/* /tmp/* /var/tmp/*'
      when: "'ID=fedora' in osr.stdout"
      changed_when: true

- name: Check for role extra tasks
  hosts: all
  gather_facts: false
  tasks:
    - name: Include shared prepare tasks if present
      ansible.builtin.include_tasks: ../shared/prepare_tasks.yml
      when: lookup('ansible.builtin.fileglob', '../shared/prepare_tasks.yml', wantlist=True) | length > 0
