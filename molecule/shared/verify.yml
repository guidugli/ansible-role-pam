---
- name: Verify pam role
  hosts: all
  gather_facts: true
  tasks:
    - name: Check Debian and Ubuntu pwquality configuration exists
      ansible.builtin.stat:
        path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf
      register: pam_pwquality_conf
      when: ansible_facts['os_family'] == 'Debian'
      tags:
        - pam
        - validate

    - name: Assert Debian and Ubuntu pwquality configuration exists
      ansible.builtin.assert:
        that:
          - pam_pwquality_conf.stat.exists
        quiet: true
      when: ansible_facts['os_family'] == 'Debian'
      tags:
        - pam
        - validate

    - name: Verify Debian and Ubuntu PAM common files include required modules
      ansible.builtin.command: >-
        grep -E '{{ item.pattern }}' {{ item.path }}
      loop:
        - {path: /etc/pam.d/common-auth, pattern: 'pam_faillock\.so.*preauth'}
        - {path: /etc/pam.d/common-auth, pattern: 'pam_faillock\.so.*authfail'}
        - {path: /etc/pam.d/common-account, pattern: 'pam_faillock\.so'}
        - {path: /etc/pam.d/common-password, pattern: 'pam_pwquality\.so'}
        - {path: /etc/pam.d/common-password, pattern: 'pam_pwhistory\.so'}
        - {path: /etc/pam.d/common-password, pattern: 'pam_unix\.so.*(sha512|yescrypt)'}
        - {path: /etc/pam.d/common-password, pattern: 'pam_unix\.so.*use_authtok'}
      register: pam_common_grep
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'
      loop_control:
        label: "{{ item.path }} {{ item.pattern }}"
      tags:
        - pam
        - validate

    - name: Assert Debian and Ubuntu PAM common module checks passed
      ansible.builtin.assert:
        that:
          - item.rc == 0
        quiet: true
      loop: "{{ pam_common_grep.results | default([]) }}"
      when: ansible_facts['os_family'] == 'Debian'
      loop_control:
        label: "{{ item.item.path }} {{ item.item.pattern }}"
      tags:
        - pam
        - validate

    - name: Verify Debian and Ubuntu security config files include CIS values
      ansible.builtin.command: >-
        grep -E '{{ item.pattern }}' {{ item.path }}
      loop:
        - {path: /etc/security/faillock.conf, pattern: '^\s*deny\s*=\s*[1-5]\b'}
        - {path: /etc/security/faillock.conf, pattern: '^\s*unlock_time\s*=\s*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b'}
        - {path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf, pattern: '^\s*difok\s*=\s*([2-9]|[1-9][0-9]+)\b'}
        - {path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf,
           pattern: '^\s*minlen\s*=\s*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\b'}
        - {path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf, pattern: '^\s*maxrepeat\s*=\s*[1-3]\b'}
        - {path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf, pattern: '^\s*maxsequence\s*=\s*[1-3]\b'}
        - {path: /etc/security/pwquality.conf.d/50-cis-pwquality.conf, pattern: '^\s*enforce_for_root\b'}
        - {path: /etc/security/pwhistory.conf, pattern: '^\s*remember\s*=\s*(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})\b'}
        - {path: /etc/security/pwhistory.conf, pattern: '^\s*enforce_for_root\b'}
        - {path: /etc/security/pwhistory.conf, pattern: '^\s*use_authtok\b'}
      register: pam_security_config_grep
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'
      loop_control:
        label: "{{ item.path }} {{ item.pattern }}"
      tags:
        - pam
        - validate

    - name: Assert Debian and Ubuntu security config checks passed
      ansible.builtin.assert:
        that:
          - item.rc == 0
        quiet: true
      loop: "{{ pam_security_config_grep.results | default([]) }}"
      when: ansible_facts['os_family'] == 'Debian'
      loop_control:
        label: "{{ item.item.path }} {{ item.item.pattern }}"
      tags:
        - pam
        - validate

    - name: Check generic pwquality configuration exists
      ansible.builtin.stat:
        path: /etc/security/pwquality.conf
      register: pam_generic_pwquality_conf
      when: ansible_facts['os_family'] != 'Debian'
      tags:
        - pam
        - validate

    - name: Assert generic pwquality configuration exists
      ansible.builtin.assert:
        that:
          - pam_generic_pwquality_conf.stat.exists
        quiet: true
      when: ansible_facts['os_family'] != 'Debian'
      tags:
        - pam
        - validate
