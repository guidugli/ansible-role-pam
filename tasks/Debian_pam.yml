---
- name: Inspect apt package index files
  ansible.builtin.find:
    paths: /var/lib/apt/lists
    patterns:
      - '*_Packages'
      - '*_Packages.lz4'
      - '*_Packages.xz'
      - '*_InRelease'
      - 'Release'
    file_type: file
  register: pam_apt_index_files
  failed_when: false
  tags:
    - pam
    - install

- name: Refresh apt cache when package indexes are missing
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when: pam_apt_index_files.files | default([]) | length == 0
  tags:
    - pam
    - install

- name: Refresh apt cache when package indexes are present
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  changed_when: false
  when: pam_apt_index_files.files | default([]) | length > 0
  tags:
    - pam
    - install

- name: Ensure libpam-pwquality is installed
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  tags:
    - pam
    - install

- name: Ensure su restriction group exists
  ansible.builtin.group:
    name: "{{ auth_su_group }}"
    state: present
  tags:
    - pam
    - config

- name: Ensure root is a member of su restriction group
  ansible.builtin.user:
    name: root
    groups: "{{ auth_su_group }}"
    append: true
  tags:
    - pam
    - config

- name: Copy Debian and Ubuntu PAM templates
  ansible.builtin.template:
    src: "{{ ansible_facts['distribution'] }}/{{ ansible_facts['distribution_major_version'] }}/{{ item }}.j2"
    dest: "/etc/pam.d/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - common-account
    - common-auth
    - common-password
    - common-session
    - common-session-noninteractive
    - su
  tags:
    - pam
    - config
